<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 夏令營報名系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f4f8; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #1a5276; margin-bottom: 5px; }
        .notice-box { background-color: #fff4f4; border: 1px solid #ffcccc; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 0.9em; }
        .warning-text { color: #d9534f; font-weight: bold; }
        h3 { background: #d5f5e3; padding: 10px; border-left: 5px solid #27ae60; font-size: 1.1em; margin-top: 30px; color: #1e8449; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input[type="text"], input[type="email"], select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d8e0; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 6px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.95em; }
        button { background-color: #27ae60; color: white; padding: 16px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1.2em; font-weight: bold; margin-top: 25px; transition: 0.3s; }
        button:hover { background-color: #219150; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>2026 未來之光：探索&科技營</h2>
    
    <div class="notice-box">
        <p>本資料僅提供2026佛教慈濟基金會三重園區暑期創意樂活報名使用。</p>
        <p class="warning-text">【防詐騙提醒】我們不會以任何名義通知更改付款方式或要求您到ATM進行任何操作！若您接獲類似電話，請勿提供任何個人金融資料，並請撥165反詐騙專線查詢或與我們聯繫：(02)2981-0310。</p>
    </div>

    <form id="enrollmentForm">
        <div class="form-group"><label>電子郵件 (Email)</label><input type="email" name="email" required></div>
        <div class="form-group"><label>填表人姓名</label><input type="text" name="submitter" required></div>

        <h3>一、 學員基本資料</h3>
        <div class="form-group"><label>學員姓名</label><input type="text" name="studentName" required></div>
        <div class="form-group">
            <label>性別</label>
            <select name="gender" required><option value="">請選擇</option><option value="男">男</option><option value="女">女</option></select>
        </div>
        <div class="form-group"><label>目前就讀學校 (例如: 三重國小)</label><input type="text" name="school" required></div>
        <div class="form-group"><label>暑假過後就讀幾年級</label><input type="text" name="grade" placeholder="例如: 四年級" required></div>
        <div class="form-group"><label>學員身分證字號 (辦理保險用)</label><input type="text" name="idNumber" required></div>
        <div class="form-group"><label>出生年月日 (例: 1080101)</label><input type="text" name="birthday" required></div>
        <div class="form-group"><label>學員健康狀況 (如過敏...，如無請填寫「無」)</label><textarea name="healthStatus" rows="2" required></textarea></div>
        <div class="form-group"><label>第幾次報名</label><input type="text" name="frequency"></div>

        <h3>二、 家長聯繫資訊</h3>
        <div class="form-group"><label>家長姓名</label><input type="text" name="parentName" required></div>
        <div class="form-group"><label>與學員關係</label><input type="text" name="relationship" required></div>
        <div class="form-group"><label>連絡電話 (市話)</label><input type="text" name="tel" placeholder="02-XXXX-XXXX"></div>
        <div class="form-group"><label>緊急連絡電話 (手機)</label><input type="text" name="mobile" placeholder="09XX-XXX-XXX" required></div>
        <div class="form-group"><label>聯絡地址</label><input type="text" name="address" required></div>

        <h3>三、 推薦來源與推薦人</h3>
        <div class="form-group">
            <label>推薦報名來自 (可複選)</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="referral" value="會員">會員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="委員">委員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="慈誠">慈誠</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="榮董">榮董</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="非會員">非會員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Facebook">Facebook</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Line">Line</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="其他">其他</label>
            </div>
        </div>
        <div class="form-group"><label>推薦人姓名</label><input type="text" name="referrerName"></div>
        <div class="form-group"><label>推薦人聯絡電話</label><input type="text" name="referrerTel"></div>

        <h3>四、 繳費確認</h3>
        <div class="form-group"><label>轉帳後五碼及時間日期 (或向誰繳費)</label><input type="text" name="paymentDetail"></div>
        <div class="form-group"><label>備註</label><textarea name="remark" rows="3"></textarea></div>

        <button type="submit" id="submitBtn">確認送出報名表</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzG1_P4ZOEx95B1T2-3XbjEDM3VD0ALuYJbNeNCFlda5Tj3jpUc261eMdS4qr722WGV/exec';
    const form = document.getElementById('enrollmentForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '正在安全傳送報名資料...';

        const formData = new FormData(form);
        
        // 處理複選框：將勾選的推薦來源合併成字串
        const referrals = [];
        document.querySelectorAll('input[name="referral"]:checked').forEach(cb => referrals.push(cb.value));
        
        const data = Object.fromEntries(formData.entries());
        data.referral = referrals.join(', '); 

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify(data)
        })
        .then(() => {
            alert('報名資料已成功傳送！\n系統將自動分配編號並寄送 Email 通知，請至信箱查收。');
            form.reset();
            btn.disabled = false;
            btn.innerText = '確認送出報名表';
        })
        .catch(error => {
            alert('傳送失敗，請檢查網路連線。');
            btn.disabled = false;
            btn.innerText = '確認送出報名表';
        });
    });
</script>

</body>
</html>
