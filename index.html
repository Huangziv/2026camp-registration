<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 科技夏令營報名系統</title>
    <style>
        body { font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; background: linear-gradient(135deg, #0b132b, #1c2541, #0a1128); color: #e0e6ed; line-height: 1.6; padding: 20px; min-height: 100vh; }
        .container { max-width: 750px; margin: auto; background: rgba(11, 19, 43, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 30px; border-radius: 15px; border: 1px solid rgba(0, 229, 255, 0.2); box-shadow: 0 0 30px rgba(0, 229, 255, 0.1); }
        .banner-img { width: 100%; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); border: 1px solid rgba(0, 229, 255, 0.5); }
        h2 { text-align: center; color: #00e5ff; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); letter-spacing: 2px; }
        h3 { background: linear-gradient(90deg, rgba(0, 229, 255, 0.15), transparent); padding: 10px 15px; border-left: 4px solid #00e5ff; font-size: 1.1em; margin-top: 35px; color: #00e5ff; border-radius: 0 8px 8px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #a4b0be; }
        .required-star { color: #ff4757; }
        input, select, textarea { width: 100%; padding: 12px 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 229, 255, 0.3); border-radius: 6px; box-sizing: border-box; color: #ffffff; }
        input:focus, select:focus { outline: none; border-color: #00e5ff; box-shadow: 0 0 12px rgba(0, 229, 255, 0.5); }
        .checkbox-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; background: rgba(255, 255, 255, 0.02); padding: 15px; border-radius: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.95em; cursor: pointer; }
        .flex-row { display: flex; gap: 10px; width: 100%; }
        .flex-row > * { flex: 1; }
        .error-msg { color: #ff4757; font-size: 0.85em; margin-top: 5px; display: none; }
        button.submit-btn { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; padding: 16px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.2em; font-weight: bold; margin-top: 30px; transition: 0.3s; letter-spacing: 2px; }
        .hidden-group { display: none; background: rgba(255, 255, 255, 0.02); padding: 15px; border-radius: 8px; border: 1px dashed rgba(0, 229, 255, 0.4); margin-top: 15px; }
        .email-container { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container">
    <img src="banner.jpg" alt="營隊 Banner" class="banner-img" onerror="this.style.display='none'">
    <h2>2026 未來之光：探索&科技營</h2>
    
    <form id="enrollmentForm">
        <div class="form-group">
            <label>電子郵件 <span class="required-star">*</span></label>
            <div class="email-container">
                <input type="text" id="emailPrefix" placeholder="帳號" required style="flex:1;">
                <span style="font-weight:bold;">@</span>
                <select id="emailDomainSelect" style="flex:1.2;">
                    <option value="gmail.com">gmail.com</option>
                    <option value="yahoo.com.tw">yahoo.com.tw</option>
                    <option value="icloud.com">icloud.com</option>
                    <option value="custom">其他 (自行輸入)</option>
                </select>
                <input type="text" id="customEmailDomain" placeholder="網域" style="display:none; flex:1;">
            </div>
            <input type="hidden" name="email" id="finalEmail">
        </div>

        <div class="form-group"><label>填表人姓名 <span class="required-star">*</span></label><input type="text" name="submitter" required></div>

        <h3>一、 學員基本資料</h3>
        <div class="form-group"><label>學員姓名 <span class="required-star">*</span></label><input type="text" name="studentName" required></div>
        <div class="form-group"><label>性別 <span class="required-star">*</span></label><select name="gender" required><option value="">請選擇</option><option value="男">男</option><option value="女">女</option></select></div>
        <div class="form-group"><label>目前就讀學校 <span class="required-star">*</span></label><input type="text" name="school" required placeholder="例：三重國小"></div>
        <div class="form-group">
            <label>暑假過後就讀年級 <span class="required-star">*</span></label>
            <select name="grade" required>
                <option value="">請選擇</option>
                <option value="一年級">一年級</option><option value="二年級">二年級</option><option value="三年級">三年級</option>
                <option value="四年級">四年級</option><option value="五年級">五年級</option><option value="六年級">六年級</option>
                <option value="國一">國一</option><option value="國二">國二</option><option value="國三">國三</option>
            </select>
        </div>
        <div class="form-group">
            <label>身分證字號 <span class="required-star">*</span></label>
            <input type="text" id="idInput" name="idNumber" maxlength="10" placeholder="保險用" required style="text-transform:uppercase;">
            <div id="idError" class="error-msg">身分證格式錯誤</div>
        </div>
        <div class="form-group">
            <label>出生年月日 <span class="required-star">*</span></label>
            <div class="flex-row">
                <select id="birthYear" required><option value="">年份</option></select>
                <select id="birthMonth" required><option value="">月份</option></select>
                <select id="birthDay" required><option value="">日期</option></select>
            </div>
            <input type="hidden" name="birthday" id="finalBirthday">
        </div>
        <div class="form-group"><label>健康狀況 <span class="required-star">*</span></label><textarea name="healthStatus" rows="2" required placeholder="無請填寫「無」"></textarea></div>
        <div class="form-group"><label>第幾次報名</label><select name="frequency"><option value="第一次">第一次</option><option value="第二次">第二次</option><option value="第三次">第三次</option></select></div>

        <h3>二、 家長聯繫資訊</h3>
        <div class="form-group"><label>家長姓名 <span class="required-star">*</span></label><input type="text" name="parentName" required></div>
        <div class="form-group"><label>與學員關係 <span class="required-star">*</span></label><select name="relationship" required><option value="父">父</option><option value="母">母</option><option value="祖父母">祖父母</option><option value="其他">其他</option></select></div>
        <div class="form-group"><label>緊急聯絡手機 <span class="required-star">*</span></label><input type="tel" id="mobileInput" name="mobile" required placeholder="09XX-XXX-XXX"></div>
        <div class="form-group">
            <label>地址 <span class="required-star">*</span></label>
            <div class="flex-row" style="margin-bottom:10px;"><select id="citySelect" required><option value="">縣市</option></select><select id="districtSelect" required><option value="">區域</option></select></div>
            <input type="text" id="addressDetail" placeholder="街道門牌" required>
            <input type="hidden" name="address" id="finalAddress">
        </div>

        <h3>三、 推薦與繳費</h3>
        <div class="form-group">
            <label>推薦報名來自 <span class="required-star">*</span></label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="referral" value="會員">會員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Facebook">Facebook</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Line">Line</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="其他">其他</label>
            </div>
        </div>

        <div class="bank-box">第一銀行泰山分行 / 戶名：吳麗玉 / 帳號：230-50-594499</div>
        <div class="form-group">
            <label>繳費方式 <span class="required-star">*</span></label>
            <select id="paymentMethodSelect" name="paymentStatus" required>
                <option value="現場繳費">現場繳費</option><option value="轉帳繳費">轉帳繳費</option><option value="轉交介紹人">轉交介紹人</option>
            </select>
        </div>
        <div id="transferBlock" class="hidden-group"><label>轉帳後五碼/介紹人資訊 <span class="required-star">*</span></label><input type="text" name="paymentDetail"></div>

        <button type="submit" id="submitBtn" class="submit-btn">確認報名並送出</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyZXIGcFXGB23REPkqFh_WhSxM-754Y8a8o_eVYJm-PL09MV2y3_1jYApio4Cl6YV2I/exec';
    
    (function init() {
        const y = document.getElementById('birthYear'), m = document.getElementById('birthMonth'), d = document.getElementById('birthDay');
        for (let i = 2005; i <= 2021; i++) y.add(new Option(`西元 ${i} 年 (民國 ${i-1911} 年)`, i));
        for (let i = 1; i <= 12; i++) m.add(new Option(i + ' 月', String(i).padStart(2, '0')));
        for (let i = 1; i <= 31; i++) d.add(new Option(i + ' 日', String(i).padStart(2, '0')));
        ["臺北市","新北市","桃園市"].forEach(c => document.getElementById('citySelect').add(new Option(c, c)));
    })();

    document.getElementById('emailDomainSelect').onchange = function() { document.getElementById('customEmailDomain').style.display = this.value === 'custom' ? 'block' : 'none'; };
    document.getElementById('paymentMethodSelect').onchange = function() { document.getElementById('transferBlock').style.display = this.value === '現場繳費' ? 'none' : 'block'; };

    document.getElementById('enrollmentForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = '處理中...';

        let domain = document.getElementById('emailDomainSelect').value;
        if(domain === 'custom') domain = document.getElementById('customEmailDomain').value;
        document.getElementById('finalEmail').value = document.getElementById('emailPrefix').value + '@' + domain;
        document.getElementById('finalBirthday').value = (parseInt(document.getElementById('birthYear').value)-1911) + document.getElementById('birthMonth').value + document.getElementById('birthDay').value;
        document.getElementById('finalAddress').value = document.getElementById('citySelect').value + document.getElementById('addressDetail').value;

        const data = Object.fromEntries(new FormData(this).entries());
        const refs = []; document.querySelectorAll('input[name="referral"]:checked').forEach(c => refs.push(c.value));
        data.referral = refs.join(', ');

        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            if (await res.text() === 'Success') {
                alert('報名成功！您的報到編號將顯示於確認信中。');
                location.reload();
            }
        } catch (e) { alert('送出失敗，請確認網路或聯繫管理員。'); }
        btn.disabled = false; btn.innerText = '確認報名並送出';
    };
</script>
</body>
</html>
