<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 夏令營報名系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h2>2026 夏令營報名表</h2>
    <form id="campForm">
        <div class="form-group"><label>電子郵件</label><input type="email" name="email" required></div>
        <div class="form-group"><label>填表人</label><input type="text" name="submitter" required></div>
        <div class="form-group"><label>學員姓名</label><input type="text" name="studentName" required></div>
        <div class="form-group"><label>性別</label>
            <select name="gender"><option value="男">男</option><option value="女">女</option></select>
        </div>
        <div class="form-group"><label>身分證字號</label><input type="text" name="idNumber" required></div>
        <div class="form-group"><label>出生年月日 (1080101)</label><input type="text" name="birthday" required></div>
        <div class="form-group"><label>繳費轉帳後五碼</label><input type="text" name="paymentDetail"></div>
        <div class="form-group"><label>備註</label><textarea name="remark"></textarea></div>
        
        <button type="submit" id="submitBtn">提交報名</button>
    </form>

    <script>
        // 重要：這裡填入你之前在 Google Apps Script 部署後取得的 Web App URL
        const scriptURL = '你的_GOOGLE_SCRIPT_URL';
        const form = document.getElementById('campForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = '資料傳送中...';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // 解決跨網域問題
                body: JSON.stringify(data)
            })
            .then(() => {
                alert('報名資料已送出！編號將由系統自動分配並寄信通知。');
                form.reset();
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('submitBtn').innerText = '提交報名';
            })
            .catch(error => alert('發生錯誤，請稍後再試。'));
        });
    </script>
</body>
</html>
