<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 科技夏令營報名系統</title>
    <style>
        :root {
            --primary-glow: #00e5ff;
            --secondary-glow: #00d2ff;
            --accent-orange: #ff9f43;
            --error-red: #ff4757;
            --success-green: #2ed573;
            --bg-dark: #0b132b;
            --glass-bg: rgba(11, 19, 43, 0.85);
            --input-bg: #16213e; /* 稍微亮一點的背景，提升對比度 */
        }

        body { 
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; 
            background: linear-gradient(135deg, #0b132b, #1c2541, #0a1128); 
            color: #e0e6ed; 
            line-height: 1.6; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }
        
        .container { 
            max-width: 800px; 
            margin: 20px auto; 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.1); 
        }

        .banner-img { 
            width: 100%; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.3); 
            border: 1px solid rgba(0, 229, 255, 0.4);
        }

        h2 { 
            text-align: center; 
            color: var(--primary-glow); 
            font-size: 1.8em;
            margin-bottom: 10px; 
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
            letter-spacing: 2px;
        }
        
        h3 { 
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.2), transparent); 
            padding: 12px 20px; 
            border-left: 5px solid var(--primary-glow); 
            font-size: 1.1em; 
            margin-top: 40px; 
            color: var(--primary-glow); 
            border-radius: 0 10px 10px 0;
        }

        /* 內容區塊 */
        .notice-box { 
            background-color: rgba(255, 71, 87, 0.08); 
            border: 1px solid rgba(255, 71, 87, 0.3); 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 30px; 
            font-size: 0.9em;
        }

        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #ced6e0; font-size: 0.95em; }
        .required-star { color: var(--error-red); margin-left: 4px; }
        
        /* ⚠️ 核心修正：強制設定下拉選單顏色 */
        input, select, textarea { 
            width: 100%; 
            padding: 14px 18px; 
            background: var(--input-bg); 
            border: 1px solid rgba(0, 229, 255, 0.4); 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1em; 
            color: #ffffff !important; /* 強制文字白色 */
            transition: 0.3s;
        }

        /* 強制設定下拉選項在所有瀏覽器的樣式 */
        select option {
            background-color: #1a1a2e; /* 深色背景 */
            color: #ffffff !important; /* 白色文字 */
            padding: 10px;
        }

        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: var(--primary-glow); 
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            background: #1b264f;
        }

        .flex-row { display: flex; gap: 15px; }
        .flex-row > * { flex: 1; min-width: 0; }

        .checkbox-group { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 15px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 10px;
        }
        .checkbox-item { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9em; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary-glow); }

        .bank-box { 
            background-color: rgba(46, 213, 115, 0.1); 
            border: 1px solid var(--success-green); 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            color: var(--success-green); 
            font-size: 0.95em;
        }

        #statusMessage {
            display: none;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95em;
        }
        .status-success { background: rgba(46, 213, 115, 0.2); color: var(--success-green); border: 1px solid var(--success-green); }
        .status-error { background: rgba(255, 71, 87, 0.2); color: var(--error-red); border: 1px solid var(--error-red); }

        button.submit-btn { 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; padding: 18px; 
            border: none; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.2em; 
            font-weight: bold; margin-top: 40px; transition: 0.4s; letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4);
        }
        button.submit-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 210, 255, 0.6); }
        button.submit-btn:disabled { background: #576574; cursor: not-allowed; opacity: 0.7; }
        
        @media (max-width: 600px) {
            .container { padding: 25px 15px; }
            .flex-row { flex-direction: column; gap: 10px; }
            h2 { font-size: 1.5em; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>2026 未來之光：探索&科技營</h2>
    
    <div class="notice-box">
        <p style="color: #ff4757; font-weight:bold; text-align:center; margin-top:0;">🚫 防詐騙提醒 🚫</p>
        <p>我們不會以任何名義要求您至 ATM 操作。若接到疑慮電話，請撥打 165 反詐騙專線或聯繫營隊：(02)2981-0310。</p>
    </div>

    <form id="enrollmentForm">
        
        <div class="form-group">
            <label>電子郵件 (Email)<span class="required-star">*</span></label>
            <div class="flex-row">
                <input type="text" id="emailPrefix" placeholder="帳號" required>
                <div style="display: flex; align-items: center; justify-content: center; font-weight:bold;">@</div>
                <select id="emailDomainSelect">
                    <option value="gmail.com">gmail.com</option>
                    <option value="yahoo.com.tw">yahoo.com.tw</option>
                    <option value="icloud.com">icloud.com</option>
                    <option value="custom">其他 (自行輸入)</option>
                </select>
            </div>
            <input type="text" id="customEmailDomain" placeholder="請輸入網域 (例: abc.com)" style="display:none; margin-top:10px;">
            <input type="hidden" name="email" id="finalEmail">
        </div>

        <div class="form-group"><label>填表人姓名<span class="required-star">*</span></label><input type="text" name="submitter" required placeholder="請輸入您的姓名"></div>

        <h3>一、 學員資料</h3>
        <div class="form-group"><label>學員姓名<span class="required-star">*</span></label><input type="text" name="studentName" required></div>
        <div class="form-group">
            <label>性別<span class="required-star">*</span></label>
            <select name="gender" required><option value="">請選擇</option><option value="男">男</option><option value="女">女</option></select>
        </div>
        <div class="form-group"><label>目前就讀學校 (例: 三重國小)<span class="required-star">*</span></label><input type="text" name="school" required></div>
        <div class="form-group">
            <label>暑假過後就讀幾年級<span class="required-star">*</span></label>
            <select name="grade" required>
                <option value="">請選擇</option>
                <option value="一年級">一年級</option><option value="二年級">二年級</option><option value="三年級">三年級</option>
                <option value="四年級">四年級</option><option value="五年級">五年級</option><option value="六年級">六年級</option>
                <option value="國一">國中一年級</option><option value="國二">國中二年級</option><option value="國三">國中三年級</option>
            </select>
        </div>
        <div class="form-group">
            <label>身分證字號 (辦理保險用)<span class="required-star">*</span></label>
            <input type="text" id="idInput" name="idNumber" maxlength="10" placeholder="例如: F123456789" required style="text-transform: uppercase;">
        </div>
        <div class="form-group">
            <label>出生年月日 (西元/民國)<span class="required-star">*</span></label>
            <div class="flex-row">
                <select id="birthYear" required><option value="">年份</option></select>
                <select id="birthMonth" required><option value="">月份</option></select>
                <select id="birthDay" required><option value="">日期</option></select>
            </div>
            <input type="hidden" name="birthday" id="finalBirthday">
        </div>
        <div class="form-group"><label>健康狀況 (過敏...，無請填無)<span class="required-star">*</span></label><textarea name="healthStatus" rows="2" required></textarea></div>
        <div class="form-group">
            <label>第幾次報名</label>
            <select name="frequency"><option value="第一次">第一次</option><option value="第二次">第二次</option><option value="第三次">第三次</option></select>
        </div>

        <h3>二、 家長聯繫</h3>
        <div class="form-group"><label>家長姓名<span class="required-star">*</span></label><input type="text" name="parentName" required></div>
        <div class="form-group">
            <label>與學員關係<span class="required-star">*</span></label>
            <select name="relationship" required><option value="父">父</option><option value="母">母</option><option value="祖父母">祖父母</option><option value="其他">其他</option></select>
        </div>
        <div class="form-group"><label>連絡電話 (市話)</label><input type="tel" name="tel" placeholder="02-XXXX-XXXX"></div>
        <div class="form-group"><label>緊急連絡手機<span class="required-star">*</span></label><input type="tel" name="mobile" required placeholder="09XX-XXX-XXX"></div>
        <div class="form-group">
            <label>聯絡地址<span class="required-star">*</span></label>
            <div class="flex-row" style="margin-bottom:10px;">
                <select id="citySelect" required><option value="">縣市</option></select>
                <select id="districtSelect" required><option value="">區域</option></select>
            </div>
            <input type="text" id="addressDetail" placeholder="街道、門牌、樓層" required>
            <input type="hidden" name="address" id="finalAddress">
        </div>

        <h3>三、 推薦與繳費</h3>
        <div class="form-group">
            <label>推薦報名來自 (可複選)<span class="required-star">*</span></label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="referral" value="會員">會員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="委員">委員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Facebook">Facebook</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Line">Line</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="非會員">非會員</label>
            </div>
        </div>

        <div class="bank-box">
            <b>💰 匯款帳戶：</b><br>
            第一銀行泰山分行 (007) / 戶名：吳麗玉 / 帳號：230-50-594499
        </div>

        <div class="form-group">
            <label>繳費方式<span class="required-star">*</span></label>
            <select id="paymentMethodSelect" name="paymentStatus" required>
                <option value="">請選擇</option>
                <option value="現場繳費">現場繳費</option>
                <option value="轉帳繳費">轉帳繳費</option>
                <option value="轉交介紹人">轉交介紹人</option>
            </select>
        </div>

        <div id="paymentDetailBlock" style="display:none; margin-top:15px;">
            <label>轉帳五碼或介紹人資訊</label>
            <input type="text" name="paymentDetail" placeholder="請輸入詳情">
        </div>

        <div class="form-group" style="margin-top:20px;"><label>備註</label><textarea name="remark" rows="3"></textarea></div>

        <div id="statusMessage"></div>
        <button type="submit" id="submitBtn" class="submit-btn">確認報名並送出資料</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyZXIGcFXGB23REPkqFh_WhSxM-754Y8a8o_eVYJm-PL09MV2y3_1jYApio4Cl6YV2I/exec';
    
    (function init() {
        const y = document.getElementById('birthYear'), m = document.getElementById('birthMonth'), d = document.getElementById('birthDay');
        for (let i = 2005; i <= 2021; i++) y.add(new Option(`西元 ${i} 年 (民國 ${i-1911} 年)`, i));
        for (let i = 1; i <= 12; i++) m.add(new Option(i + ' 月', String(i).padStart(2, '0')));
        for (let i = 1; i <= 31; i++) d.add(new Option(i + ' 日', String(i).padStart(2, '0')));

        const cityData = {
            "新北市": ["三重區", "蘆洲區", "新莊區", "板橋區", "中和區", "永和區", "五股區", "泰山區"],
            "臺北市": ["萬華區", "中正區", "大同區", "士林區", "北投區", "中山區"]
        };
        const cSel = document.getElementById('citySelect'), dSel = document.getElementById('districtSelect');
        Object.keys(cityData).forEach(c => cSel.add(new Option(c, c)));
        cSel.onchange = () => {
            dSel.innerHTML = '<option value="">區域</option>';
            if(cityData[cSel.value]) cityData[cSel.value].forEach(d => dSel.add(new Option(d, d)));
        };
    })();

    document.getElementById('emailDomainSelect').onchange = function() {
        document.getElementById('customEmailDomain').style.display = this.value === 'custom' ? 'block' : 'none';
    };

    document.getElementById('paymentMethodSelect').onchange = function() {
        document.getElementById('paymentDetailBlock').style.display = (this.value === '現場繳費' || this.value === '') ? 'none' : 'block';
    };

    const form = document.getElementById('enrollmentForm');
    const msg = document.getElementById('statusMessage');

    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = '處理中...';
        showStatus("資料傳送中，請稍候...", "success");

        let dom = document.getElementById('emailDomainSelect').value;
        if(dom === 'custom') dom = document.getElementById('customEmailDomain').value;
        document.getElementById('finalEmail').value = document.getElementById('emailPrefix').value + "@" + dom;
        document.getElementById('finalBirthday').value = (document.getElementById('birthYear').value - 1911) + document.getElementById('birthMonth').value + document.getElementById('birthDay').value;
        document.getElementById('finalAddress').value = document.getElementById('citySelect').value + document.getElementById('districtSelect').value + document.getElementById('addressDetail').value;

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        const refs = [];
        document.querySelectorAll('input[name="referral"]:checked').forEach(c => refs.push(c.value));
        data.referral = refs.join(', ');

        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            const result = await res.text();
            if(result === 'Success') {
                showStatus("✅ 報名成功！請至信箱查收確認信。", "success");
                form.reset();
                window.scrollTo(0,0);
            } else { showStatus("❌ 錯誤：" + result, "error"); }
        } catch (error) { showStatus("🚨 網路錯誤，請稍後再試。", "error"); }
        btn.disabled = false; btn.innerText = '確認報名並送出資料';
    };

    function showStatus(text, type) {
        msg.innerText = text;
        msg.style.display = 'block';
        msg.className = type === 'success' ? 'status-success' : 'status-error';
    }
</script>

</body>
</html>
