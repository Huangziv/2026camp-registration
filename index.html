<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 科技夏令營報名系統</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e5ff; --secondary: #007cf0; --bg-dark: #050a18;
            --glass: rgba(11, 20, 45, 0.9); --input-bg: rgba(255, 255, 255, 0.08);
            --neon-glow: 0 0 20px rgba(0, 229, 255, 0.4);
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #0e1a3a 0%, #050a18 100%);
            background-attachment: fixed; color: #e0e6ed; margin: 0; padding: 0;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px; z-index: -1;
        }
        .container {
            max-width: 850px; margin: 40px auto; background: var(--glass);
            backdrop-filter: blur(30px); padding: 40px; border-radius: 28px;
            border: 1px solid rgba(0, 229, 255, 0.3); box-shadow: 0 25px 80px rgba(0,0,0,0.9);
        }
        .banner-img { width: 100%; border-radius: 20px; box-shadow: var(--neon-glow); border: 1px solid var(--primary); margin-bottom: 30px; }
        h2 { font-family: 'Orbitron', sans-serif; text-align: center; color: var(--primary); font-size: 2.3em; letter-spacing: 4px; text-shadow: 0 0 20px rgba(0, 229, 255, 0.7); }
        .official-notice { background: rgba(0, 229, 255, 0.03); border-radius: 16px; padding: 25px; margin-bottom: 40px; border: 1px solid rgba(0, 229, 255, 0.15); text-align: center; }
        .location-info { color: var(--primary); font-weight: bold; font-size: 1.1em; margin-bottom: 10px; }
        .camp-time { display: flex; justify-content: center; gap: 30px; font-weight: bold; color: var(--primary); font-family: 'Orbitron', sans-serif; }
        h3 { border-left: 8px solid var(--primary); background: linear-gradient(90deg, rgba(0,229,255,0.1), transparent); padding: 15px 20px; margin: 50px 0 25px; color: var(--primary); font-size: 1.4em; }
        .form-group { margin-bottom: 30px; }
        label { display: block; margin-bottom: 12px; font-weight: bold; color: #ced6e0; }
        .required { color: #ff4757; margin-left: 6px; }
        input, select, textarea { width: 100%; padding: 16px; background: var(--input-bg); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(0,229,255,0.5); }
        .flex-row { display: flex; gap: 18px; align-items: center; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .sub-field-box { background: rgba(0,229,255,0.05); border-radius: 16px; border: 1px solid rgba(0,229,255,0.2); padding: 20px; margin-top: 15px; }
        .submit-btn { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: #050a18; padding: 22px; border: none; border-radius: 16px; cursor: pointer; width: 100%; font-size: 1.4em; font-weight: 800; margin-top: 30px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: none; justify-content: center; align-items: center; z-index: 10000; }
        .modal-content { background: #0e1a3a; border: 2px solid var(--primary); border-radius: 24px; padding: 40px; max-width: 400px; width: 85%; text-align: center; box-shadow: 0 0 50px rgba(0, 229, 255, 0.6); }
        .reg-id-display { font-family: 'Orbitron', sans-serif; font-size: 1.8em; color: #ff4757; margin: 20px 0; letter-spacing: 2px; border: 1px dashed var(--primary); padding: 10px; }
        .modal-close-btn { background: var(--primary); color: #050a18; padding: 12px 40px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="modal-overlay" id="resultModal">
    <div class="modal-content">
        <span style="font-size: 4em;">🚀</span>
        <div style="font-size: 1.8em; color: var(--primary); font-weight: bold; margin-bottom: 15px;">報名提交成功</div>
        <div style="color: #b0b8c1;">您的專屬報到編號為：</div>
        <div class="reg-id-display" id="displayRegID">----</div>
        <div style="color: #b0b8c1; margin-bottom: 30px;">請記下編號並查收 Email 確認信。</div>
        <button class="modal-close-btn" onclick="location.reload()">確認並關閉</button>
    </div>
</div>

<div class="container">
    <img src="banner.jpg" alt="[2026 夏令營橫幅]" class="banner-img" onerror="this.style.display='none'">
    <h2>2026 FUTURE LIGHT</h2>
    <div class="official-notice">
        <div class="location-info">📍 活動地點：慈濟三重園區 (新北市三重區中正北路472號)</div>
        <div class="camp-time">
            <span>📅 7/17 (五) 07:30 - 17:00</span>
            <span>📅 7/18 (六) 07:30 - 20:15</span>
        </div>
    </div>

    <form id="enrollmentForm">
        <div class="form-group">
            <label>電子郵件 (Email)<span class="required">*</span></label>
            <div class="flex-row">
                <input type="text" id="emailPrefix" placeholder="帳號" required>
                <div style="font-weight:bold; font-size: 1.4em; color: var(--primary);">@</div>
                <select id="emailDomainSelect" required>
                    <option value="gmail.com">gmail.com</option>
                    <option value="yahoo.com.tw">yahoo.com.tw</option>
                    <option value="msa.hinet.net">msa.hinet.net</option>
                    <option value="icloud.com">icloud.com</option>
                    <option value="custom">其他</option>
                </select>
            </div>
            <input type="hidden" name="email" id="finalEmail">
        </div>

        <div class="form-group"><label>填表人姓名<span class="required">*</span></label><input type="text" name="submitter" required></div>
        <h3>一、 學員基本資料</h3>
        <div class="form-group"><label>學員姓名<span class="required">*</span></label><input type="text" name="studentName" required></div>
        <div class="form-group"><label>性別<span class="required">*</span></label><select name="gender" required><option value="男">男</option><option value="女">女</option></select></div>
        <div class="form-group"><label>就讀學校<span class="required">*</span></label><input type="text" name="school" required></div>
        <div class="form-group">
            <label>暑假過後年級<span class="required">*</span></label>
            <select name="grade" required>
                <optgroup label="國小"><option value="一年級">國小一年級</option><option value="二年級">國小二年級</option><option value="三年級">國小三年級</option><option value="四年級">國小四年級</option><option value="五年級">國小五年級</option><option value="六年級">國小六年級</option></optgroup>
                <optgroup label="國中"><option value="國一">國中一年級</option><option value="國二">國中二年級</option><option value="國三">國中三年級</option></optgroup>
            </select>
        </div>
        <div class="form-group"><label>身分證字號<span class="required">*</span></label><input type="text" id="idInput" name="idNumber" maxlength="10" required style="text-transform: uppercase;"></div>
        <div class="form-group">
            <label>出生年月日<span class="required">*</span></label>
            <div class="flex-row">
                <select id="birthYear" required></select><select id="birthMonth" required></select><select id="birthDay" required></select>
            </div>
            <input type="hidden" name="birthday" id="finalBirthday">
        </div>
        <div class="form-group"><label>學員健康狀況<span class="required">*</span></label><textarea name="healthStatus" rows="2" required placeholder="無則填無"></textarea></div>

        <h3>二、 家長聯繫</h3>
        <div class="form-group"><label>家長姓名<span class="required">*</span></label><input type="text" name="parentName" required></div>
        <div class="form-group"><label>關係<span class="required">*</span></label><select name="relationship" required><option value="父">父</option><option value="母">母</option><option value="其他">其他</option></select></div>
        <div class="form-group"><label>緊急手機<span class="required">*</span></label><input type="tel" id="mobileInput" name="mobile" required placeholder="09XX-XXX-XXX"></div>
        <div class="form-group">
            <label>地址<span class="required">*</span></label>
            <div class="flex-row"><select id="citySelect" required></select><select id="districtSelect" required></select></div>
            <input type="text" id="addressDetail" placeholder="街道巷弄" required>
            <input type="hidden" name="address" id="finalAddress">
        </div>

        <h3>三、 繳費資訊</h3>
        <div class="bank-info"><strong>💎 一銀泰山分行 (007) / 戶名：吳麗玉 / 帳號：230-50-594499</strong></div>
        <div class="form-group">
            <label>繳費方式<span class="required">*</span></label>
            <select id="paymentMethodSelect" name="paymentStatus" required>
                <option value="轉帳繳費">銀行轉帳</option>
                <option value="轉交介紹人">轉交介紹人</option>
                <option value="其他">其他方式</option>
            </select>
        </div>
        <div id="bankDetailFields" class="sub-field-box" style="display:none;">
            <div class="form-group"><label>末五碼<span class="required">*</span></label><input type="text" id="bankLast5" name="bankLast5" maxlength="5"></div>
            <input type="hidden" name="bankDateTime" id="finalBankDateTime">
        </div>
        <div id="referralDetailFields" class="sub-field-box" style="display:none;">
            <div class="grid-2">
                <div><label>介紹人姓名<span class="required">*</span></label><input type="text" id="referralName" name="referralName"></div>
                <div><label>介紹手機<span class="required">*</span></label><input type="tel" id="referralPhone" name="referralPhone"></div>
            </div>
        </div>
        
        <button type="submit" id="submitBtn" class="submit-btn">立即傳送報名資料</button>
    </form>
</div>

<script>
    const scriptURL = '您的AppsScript部署網址'; // ❌ 這裡請填入您的部署網址

    // 初始化選單、日期、電話連字號邏輯 (略，請沿用之前的 Script 部分)
    // ... 原本的初始化 JS 程式碼 ...

    document.getElementById('enrollmentForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = '傳輸中...';

        // 組合 finalEmail, finalBirthday, finalAddress 等隱藏欄位
        // ... (原本的組合邏輯) ...

        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());

        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            const result = await res.json(); // ✅ 改為讀取 JSON 回傳
            
            if(result.status === 'Success') {
                document.getElementById('displayRegID').innerText = result.regID; // ✅ 顯示回傳的編號
                document.getElementById('resultModal').style.display = 'flex';
            } else {
                alert('提交失敗：' + result.message);
            }
        } catch (error) {
            alert('系統異常，請稍後再試。');
        } finally {
            btn.disabled = false; btn.innerText = '立即傳送報名資料';
        }
    };
</script>
</body>
</html>
