<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 科技夏令營報名系統</title>
    <style>
        :root {
            --primary: #00e5ff;
            --secondary: #00d2ff;
            --bg-dark: #0b132b;
            --glass: rgba(11, 19, 43, 0.9);
            --accent-orange: #ff9f43;
            --success: #2ed573;
            --error: #ff4757;
        }

        body { 
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; 
            background: linear-gradient(135deg, #0b132b, #1c2541, #0a1128); 
            color: #e0e6ed; 
            line-height: 1.6; 
            padding: 15px; 
            margin: 0;
            min-height: 100vh;
        }
        
        .container { 
            max-width: 750px; 
            margin: 15px auto; 
            background: var(--glass); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5); 
        }

        .banner-img { 
            width: 100%; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); 
            border: 1px solid var(--primary);
            display: block;
        }

        h2 { 
            text-align: center; 
            color: var(--primary); 
            font-size: 1.8em;
            margin-bottom: 10px; 
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            letter-spacing: 2px;
        }
        
        /* 精彩課程卡片 */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .course-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
        }
        .course-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .course-icon { font-size: 2.2em; display: block; margin-bottom: 10px; }
        .course-title { color: var(--accent-orange); font-weight: bold; margin-bottom: 5px; }
        .course-desc { font-size: 0.85em; color: #ced6e0; text-align: left; }

        .starry-night { grid-column: 1 / -1; background: rgba(0, 229, 255, 0.05); border: 1px dashed var(--primary); }

        h3 { 
            background: linear-gradient(90deg, rgba(0, 229, 255, 0.15), transparent); 
            padding: 10px 15px; 
            border-left: 5px solid var(--primary); 
            font-size: 1.1em; 
            margin-top: 40px; 
            color: var(--primary); 
            border-radius: 0 8px 8px 0;
        }

        .notice-box { 
            background-color: rgba(255, 71, 87, 0.1); 
            border: 1px solid rgba(255, 71, 87, 0.3); 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 25px; 
            font-size: 0.9em;
        }

        .form-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #ced6e0; font-size: 0.95em; }
        .required { color: var(--error); margin-left: 4px; }
        
        /* ⚠️ 解決字體看不見：強制白底黑字 */
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            background: #ffffff !important; 
            color: #000000 !important; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 16px; 
            box-sizing: border-box; 
        }

        select option { background: #ffffff; color: #000000; }

        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row > * { flex: 1; }

        .checkbox-group { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 12px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px;
        }
        .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 0.9em; cursor: pointer; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }

        .bank-info { 
            background: rgba(46, 213, 115, 0.1); 
            border: 1px solid var(--success); 
            padding: 15px; border-radius: 10px; color: var(--success); font-size: 0.95em; margin-bottom: 20px;
        }

        .status-msg { display: none; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: center; font-weight: bold; }
        .success { background: rgba(46, 213, 115, 0.2); color: var(--success); border: 1px solid var(--success); }
        .error { background: rgba(255, 71, 87, 0.2); color: var(--error); border: 1px solid var(--error); }

        .submit-btn { 
            background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; padding: 16px; 
            border: none; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1.2em; 
            font-weight: bold; margin-top: 25px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
        }
        .submit-btn:disabled { background: #576574; opacity: 0.7; cursor: not-allowed; }

        @media (max-width: 600px) {
            .flex-row { flex-direction: column; gap: 15px; }
            .course-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="banner.jpg" alt="營隊橫幅" class="banner-img" onerror="this.style.display='none'">

    <h2>2026 未來之光：探索&科技營</h2>
    
    <div class="notice-box">
        <strong style="color:var(--error);">🛡️ 防詐騙提醒：</strong><br>
        我們不會電話要求您至 ATM 操作。若接到疑慮電話，請撥打 165 反詐騙專線。
    </div>

    <div class="course-grid">
        <div class="course-card">
            <span class="course-icon">🚀</span>
            <span class="course-title">前瞻科技探索</span>
            <span class="course-desc">結合最新科技趨勢，啟發孩子對未來數位領域的好奇心。</span>
        </div>
        <div class="course-card">
            <span class="course-icon">🌿</span>
            <span class="course-title">戶外探索體驗</span>
            <span class="course-desc">走進自然，學習互助合作，勇敢迎接挑戰並突破自我。</span>
        </div>
        <div class="course-card starry-night">
            <span class="course-icon">🌟</span>
            <span class="course-title">星光人文之夜 (7/18 晚間)</span>
            <span style="display:block; text-align:center; font-size:0.85em; color:#ced6e0;">愛的饗宴、震撼舞龍展演、親子同樂與各隊創意表演。</span>
        </div>
    </div>

    <form id="enrollmentForm">
        
        <div class="form-group">
            <label>電子郵件 (Email)<span class="required">*</span></label>
            <div class="flex-row">
                <input type="text" id="emailPrefix" placeholder="帳號" required>
                <div style="font-weight:bold; text-align: center;">@</div>
                <select id="emailDomainSelect">
                    <option value="gmail.com">gmail.com</option>
                    <option value="yahoo.com.tw">yahoo.com.tw</option>
                    <option value="icloud.com">icloud.com</option>
                    <option value="custom">其他</option>
                </select>
            </div>
            <input type="text" id="customEmailDomain" placeholder="請輸入網域" style="display:none; margin-top:10px;">
            <input type="hidden" name="email" id="finalEmail">
        </div>

        <div class="form-group"><label>填表人姓名<span class="required">*</span></label><input type="text" name="submitter" required></div>

        <h3>一、 學員基本資料</h3>
        <div class="form-group"><label>學員姓名<span class="required">*</span></label><input type="text" name="studentName" required></div>
        <div class="form-group"><label>性別<span class="required">*</span></label><select name="gender" required><option value="">請選擇</option><option value="男">男</option><option value="女">女</option></select></div>
        <div class="form-group"><label>目前就讀學校<span class="required">*</span></label><input type="text" name="school" required placeholder="例：三重國小"></div>
        <div class="form-group">
            <label>暑假過後就讀年級<span class="required">*</span></label>
            <select name="grade" required>
                <option value="">選擇年級</option>
                <option value="一年級">一年級</option><option value="二年級">二年級</option><option value="三年級">三年級</option>
                <option value="四年級">四年級</option><option value="五年級">五年級</option><option value="六年級">六年級</option>
                <option value="國一">國一</option><option value="國二">國二</option><option value="國三">國三</option>
            </select>
        </div>
        <div class="form-group"><label>身分證字號<span class="required">*</span></label><input type="text" name="idNumber" maxlength="10" required placeholder="F123456789" style="text-transform: uppercase;"></div>
        <div class="form-group">
            <label>出生年月日<span class="required">*</span></label>
            <div class="flex-row">
                <select id="birthYear" required><option value="">年份</option></select>
                <select id="birthMonth" required><option value="">月份</option></select>
                <select id="birthDay" required><option value="">日期</option></select>
            </div>
            <input type="hidden" name="birthday" id="finalBirthday">
        </div>
        <div class="form-group"><label>學員健康狀況<span class="required">*</span></label><textarea name="healthStatus" rows="2" required placeholder="無請填無"></textarea></div>
        <div class="form-group"><label>第幾次報名</label><select name="frequency"><option value="第一次">第一次</option><option value="第二次">第二次</option><option value="第三次">第三次</option></select></div>

        <h3>二、 家長聯繫資訊</h3>
        <div class="form-group"><label>家長姓名<span class="required">*</span></label><input type="text" name="parentName" required></div>
        <div class="form-group"><label>與學員關係<span class="required">*</span></label><select name="relationship" required><option value="父">父</option><option value="母">母</option><option value="祖父母">祖父母</option><option value="其他">其他</option></select></div>
        <div class="form-group"><label>連絡電話 (市話)</label><input type="tel" name="tel" placeholder="02-XXXX-XXXX"></div>
        <div class="form-group"><label>緊急連絡手機<span class="required">*</span></label><input type="tel" name="mobile" required placeholder="09XX-XXX-XXX"></div>
        <div class="form-group"><label>聯絡地址<span class="required">*</span></label><input type="text" id="fullAddress" placeholder="縣市/區域/街道門牌" required><input type="hidden" name="address" id="finalAddress"></div>

        <h3>三、 其他資訊</h3>
        <div class="form-group">
            <label>推薦報名來自 (可複選)<span class="required">*</span></label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="referral" value="會員">會員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Facebook">Facebook</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Line">Line</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="非會員">非會員</label>
            </div>
        </div>

        <div class="bank-info"><strong>💰 第一銀行泰山分行 (007) / 230-50-594499 / 吳麗玉</strong></div>
        <div class="form-group">
            <label>繳費方式<span class="required">*</span></label>
            <select id="paymentMethodSelect" name="paymentStatus" required>
                <option value="現場繳費">現場繳費</option>
                <option value="轉帳繳費">轉帳繳費</option>
                <option value="轉交介紹人">轉交介紹人</option>
            </select>
        </div>
        <div id="paymentDetailBlock" style="display:none; margin-bottom: 20px;"><label>轉帳五碼或介紹人詳情</label><input type="text" name="paymentDetail"></div>
        <div class="form-group"><label>備註</label><textarea name="remark" rows="2"></textarea></div>

        <div id="statusMsg" class="status-msg"></div>
        <button type="submit" id="submitBtn" class="submit-btn">確認傳送報名資料</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyZXIGcFXGB23REPkqFh_WhSxM-754Y8a8o_eVYJm-PL09MV2y3_1jYApio4Cl6YV2I/exec';
    
    (function init() {
        const y = document.getElementById('birthYear'), m = document.getElementById('birthMonth'), d = document.getElementById('birthDay');
        for (let i = 2005; i <= 2021; i++) y.add(new Option(`西元 ${i} 年 (${i-1911}年)`, i));
        for (let i = 1; i <= 12; i++) m.add(new Option(i + '月', String(i).padStart(2, '0')));
        for (let i = 1; i <= 31; i++) d.add(new Option(i + '日', String(i).padStart(2, '0')));
    })();

    document.getElementById('emailDomainSelect').onchange = function() { document.getElementById('customEmailDomain').style.display = this.value === 'custom' ? 'block' : 'none'; };
    document.getElementById('paymentMethodSelect').onchange = function() { document.getElementById('paymentDetailBlock').style.display = this.value === '現場繳費' ? 'none' : 'block'; };

    document.getElementById('enrollmentForm').onsubmit = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn'), msg = document.getElementById('statusMsg');
        btn.disabled = true; btn.innerText = '處理中...';
        msg.style.display = 'block'; msg.innerText = '⏳ 正在寫入 Excel...'; msg.className = 'status-msg success';

        let dom = document.getElementById('emailDomainSelect').value === 'custom' ? document.getElementById('customEmailDomain').value : document.getElementById('emailDomainSelect').value;
        document.getElementById('finalEmail').value = document.getElementById('emailPrefix').value + "@" + dom;
        document.getElementById('finalBirthday').value = (document.getElementById('birthYear').value - 1911) + document.getElementById('birthMonth').value + document.getElementById('birthDay').value;
        document.getElementById('finalAddress').value = document.getElementById('fullAddress').value;

        const formData = new FormData(this);
        const refs = []; document.querySelectorAll('input[name="referral"]:checked').forEach(c => refs.push(c.value));
        const data = Object.fromEntries(formData.entries());
        data.referral = refs.join(', ');

        try {
            const res = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) });
            if(await res.text() === 'Success') {
                msg.innerText = '✅ 報名完成！資料已正確寫入，編號見信箱。';
                this.reset(); window.scrollTo(0, 0);
            }
        } catch (err) { msg.innerText = '❌ 錯誤：' + err.message; msg.className = 'status-msg error'; }
        btn.disabled = false; btn.innerText = '確認傳送報名資料';
    };
</script>
</body>
</html>
