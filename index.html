<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 夏令營報名系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        h3 { background: #e8f5e9; padding: 10px; border-left: 5px solid #4CAF50; font-size: 1.1em; margin-top: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 5px; }
        button { background-color: #4CAF50; color: white; padding: 15px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1.1em; margin-top: 20px; transition: 0.3s; }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>2026 未來之光：探索&科技營 報名表</h2>
    
    <form id="enrollmentForm">
        <div class="form-group"><label>電子郵件</label><input type="email" name="email" required></div>
        <div class="form-group"><label>填表人姓名</label><input type="text" name="submitter" required></div>

        <h3>一、 學員基本資料</h3>
        <div class="form-group"><label>學員姓名</label><input type="text" name="studentName" required></div>
        <div class="form-group">
            <label>性別</label>
            <select name="gender" required><option value="">請選擇</option><option value="男">男</option><option value="女">女</option></select>
        </div>
        <div class="form-group"><label>目前就讀學校 (例如: 三重國小)</label><input type="text" name="school" required></div>
        <div class="form-group"><label>目前就讀年級 (暑假後)</label><input type="text" name="grade" placeholder="例如: 四年級" required></div>
        <div class="form-group"><label>學員身分證字號 (辦理保險用)</label><input type="text" name="idNumber" required></div>
        <div class="form-group"><label>出生年月日 (例: 1080101)</label><input type="text" name="birthday" required></div>

        <h3>二、 家長聯繫資訊</h3>
        <div class="form-group"><label>家長姓名</label><input type="text" name="parentName" required></div>
        <div class="form-group"><label>與學員關係</label><input type="text" name="relationship" required></div>
        <div class="form-group"><label>連絡電話 (市話)</label><input type="text" name="tel" placeholder="02-XXXX-XXXX"></div>
        <div class="form-group"><label>緊急連絡電話 (手機)</label><input type="text" name="mobile" placeholder="09XX-XXX-XXX" required></div>
        <div class="form-group"><label>聯絡地址</label><input type="text" name="address" required></div>

        <h3>三、 營隊健康與紀錄</h3>
        <div class="form-group"><label>學員健康狀況 (過敏、特殊病史，無則填「無」)</label><textarea name="healthStatus" rows="2" required></textarea></div>
        <div class="form-group"><label>第幾次報名</label><input type="text" name="frequency"></div>
        
        <div class="form-group">
            <label>推薦報名來自 (可複選)</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox" name="referral" value="會員">會員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="委員">委員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="慈誠">慈誠</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="榮董">榮董</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="非會員">非會員</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Facebook">Facebook</label>
                <label class="checkbox-item"><input type="checkbox" name="referral" value="Line">Line</label>
            </div>
        </div>
        <div class="form-group"><label>推薦人姓名</label><input type="text" name="referrerName"></div>
        <div class="form-group"><label>推薦人聯絡電話</label><input type="text" name="referrerTel"></div>

        <h3>四、 繳費資訊</h3>
        <div class="form-group">
            <label>是否已繳費</label>
            <select name="isPaid"><option value="否">否</option><option value="是">是</option></select>
        </div>
        <div class="form-group"><label>轉帳後五碼及時間日期</label><input type="text" name="paymentDetail"></div>
        <div class="form-group"><label>備註</label><textarea name="remark" rows="3"></textarea></div>

        <button type="submit" id="submitBtn">確認送出報名表</button>
    </form>
</div>

<script>
    const scriptURL = '請貼上您部署的GAS網址';
    const form = document.getElementById('enrollmentForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '正在處理報名資料...';

        // 收集複選框資料
        const formData = new FormData(form);
        const referrals = [];
        document.querySelectorAll('input[name="referral"]:checked').forEach(cb => referrals.push(cb.value));
        
        const data = Object.fromEntries(formData.entries());
        data.referral = referrals.join(', '); // 將複選內容合併為字串

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data)})
        .then(() => {
            alert('報名資料已成功傳送！請查看電子郵件確認報到編號。');
            form.reset();
            btn.disabled = false;
            btn.innerText = '確認送出報名表';
        })
        .catch(error => {
            alert('發生錯誤，請檢查網路連線或聯繫管理員。');
            console.error('Error!', error.message);
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
